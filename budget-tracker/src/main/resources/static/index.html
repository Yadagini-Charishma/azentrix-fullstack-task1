<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Budget Tracker</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
	<script>
	  // Redirect to login if not logged in
	  fetch('http://localhost:8080/api/auth/me', { credentials: 'include' })
	    .then(res => { if (!res.ok) window.location.href = 'login.html'; })
	    .catch(() => window.location.href = 'login.html');
	</script>

	<header>
	  <div class="logo">💰 Budget Tracker</div>
	  <nav>
	    <span id="welcomeUser" style="color:rgba(255,255,255,0.85);font-size:0.9rem;margin-right:8px;"></span>
	    <button onclick="showSection('dashboard')">Dashboard</button>
	    <button onclick="showSection('entries')">All Entries</button>
	    <button onclick="showSection('add')">+ Add Entry</button>
	    <button onclick="doLogout()" style="background:rgba(234,67,53,0.7);border-color:rgba(234,67,53,0.9);">🚪 Logout</button>
	  </nav>
	</header>

<!-- ═══════════════════ DASHBOARD ═══════════════════ -->
<section id="dashboard" class="section active">
  <h2>Monthly Dashboard</h2>

  <div class="month-filter">
    <label>Year:
      <input type="number" id="filterYear" value="2025" min="2000" max="2100"/>
    </label>
    <label>Month:
      <select id="filterMonth">
        <option value="1">January</option>
        <option value="2">February</option>
        <option value="3">March</option>
        <option value="4">April</option>
        <option value="5">May</option>
        <option value="6">June</option>
        <option value="7" selected>July</option>
        <option value="8">August</option>
        <option value="9">September</option>
        <option value="10">October</option>
        <option value="11">November</option>
        <option value="12">December</option>
      </select>
    </label>
    <button onclick="loadDashboard()">Load</button>
  </div>

  <div class="summary-cards">
    <div class="card income">
      <h3>Total Income</h3>
      <p id="totalIncome">₹0</p>
    </div>
    <div class="card expense">
      <h3>Total Expense</h3>
      <p id="totalExpense">₹0</p>
    </div>
    <div class="card balance">
      <h3>Balance</h3>
      <p id="balance">₹0</p>
    </div>
  </div>

  <div class="charts-row">
    <div class="chart-box">
      <h3>Income vs Expense</h3>
      <canvas id="barChart"></canvas>
    </div>
    <div class="chart-box">
      <h3>Expense by Category</h3>
      <canvas id="pieChart"></canvas>
    </div>
  </div>
</section>

<!-- ═══════════════════ ALL ENTRIES ═══════════════════ -->
<section id="entries" class="section">
  <h2>All Entries</h2>
  <button class="btn-refresh" onclick="loadAllEntries()">🔄 Refresh</button>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>ID</th><th>Title</th><th>Amount</th><th>Type</th>
          <th>Category</th><th>Date</th><th>Note</th><th>Actions</th>
        </tr>
      </thead>
      <tbody id="entriesBody"></tbody>
    </table>
  </div>
</section>

<!-- ═══════════════════ ADD / EDIT FORM ═══════════════════ -->
<section id="add" class="section">
  <h2 id="formTitle">Add New Entry</h2>
  <form class="entry-form" onsubmit="submitForm(event)">
    <input type="hidden" id="editId"/>

    <div class="form-group">
      <label>Title *</label>
      <input type="text" id="title" placeholder="e.g. Salary, Groceries" required/>
    </div>

    <div class="form-group">
      <label>Amount (₹) *</label>
      <input type="number" id="amount" placeholder="e.g. 5000" min="0" step="0.01" required/>
    </div>

    <div class="form-group">
      <label>Type *</label>
      <select id="type" required>
        <option value="">-- Select --</option>
        <option value="INCOME">Income</option>
        <option value="EXPENSE">Expense</option>
      </select>
    </div>

    <div class="form-group">
      <label>Category *</label>
      <select id="category" required>
        <option value="">-- Select --</option>
        <option value="Salary">Salary</option>
        <option value="Freelance">Freelance</option>
        <option value="Business">Business</option>
        <option value="Investment">Investment</option>
        <option value="Food">Food</option>
        <option value="Transport">Transport</option>
        <option value="Shopping">Shopping</option>
        <option value="Bills">Bills</option>
        <option value="Health">Health</option>
        <option value="Entertainment">Entertainment</option>
        <option value="Education">Education</option>
        <option value="Other">Other</option>
      </select>
    </div>

    <div class="form-group">
      <label>Date *</label>
      <input type="date" id="date" required/>
    </div>

    <div class="form-group">
      <label>Note</label>
      <input type="text" id="note" placeholder="Optional note"/>
    </div>

    <div class="form-buttons">
      <button type="submit" class="btn-save">💾 Save</button>
      <button type="button" class="btn-cancel" onclick="resetForm()">✖ Cancel</button>
    </div>
  </form>
</section>

<!-- Toast Notification -->
<div id="toast" class="toast"></div>

<script src="app.js"></script>
</body>
</html>
