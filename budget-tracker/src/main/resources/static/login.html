<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Budget Tracker — Login</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }

    .card {
      background: white; border-radius: 20px;
      padding: 40px 36px; width: 100%; max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }

    .logo { text-align:center; font-size:2.2rem; margin-bottom:4px; }
    .app-name { text-align:center; font-size:1.4rem; font-weight:700; color:#1a73e8; margin-bottom:4px; }
    .tagline { text-align:center; color:#888; font-size:0.85rem; margin-bottom:28px; }

    /* Tabs */
    .tabs { display:flex; background:#f1f3f4; border-radius:10px; padding:4px; margin-bottom:24px; }
    .tab {
      flex:1; text-align:center; padding:9px;
      border-radius:8px; cursor:pointer;
      font-size:0.9rem; font-weight:600; color:#555;
      transition: all 0.2s;
    }
    .tab.active { background:white; color:#1a73e8; box-shadow:0 2px 6px rgba(0,0,0,0.1); }

    /* Forms */
    .form-section { display:none; }
    .form-section.active { display:block; }

    .form-group { margin-bottom:16px; }
    .form-group label { display:block; font-size:0.85rem; font-weight:600; color:#555; margin-bottom:6px; }
    .form-group input {
      width:100%; padding:11px 14px;
      border:1.5px solid #e0e0e0; border-radius:10px;
      font-size:0.95rem; transition: border-color 0.2s;
      outline:none;
    }
    .form-group input:focus { border-color:#1a73e8; }

    .btn-main {
      width:100%; padding:13px;
      background: linear-gradient(135deg, #1a73e8, #0d47a1);
      color:white; border:none; border-radius:10px;
      font-size:1rem; font-weight:600; cursor:pointer;
      margin-top:4px; transition: opacity 0.2s;
    }
    .btn-main:hover { opacity:0.9; }

    .msg {
      margin-top:14px; padding:10px 14px;
      border-radius:8px; font-size:0.88rem; display:none;
      text-align:center;
    }
    .msg.success { background:#e6f4ea; color:#34a853; display:block; }
    .msg.error   { background:#fce8e6; color:#ea4335; display:block; }

    .footer-note {
      text-align:center; margin-top:20px;
      font-size:0.8rem; color:#aaa;
    }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">💰</div>
  <div class="app-name">Budget Tracker</div>
  <div class="tagline">Track your income & expenses smartly</div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" onclick="switchTab('login')">Login</div>
    <div class="tab"        onclick="switchTab('register')">Register</div>
  </div>

  <!-- LOGIN FORM -->
  <div class="form-section active" id="loginSection">
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="loginUsername" placeholder="Enter your username"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="Enter your password"/>
    </div>
    <button class="btn-main" onclick="doLogin()">Login →</button>
    <div class="msg" id="loginMsg"></div>
  </div>

  <!-- REGISTER FORM -->
  <div class="form-section" id="registerSection">
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="regUsername" placeholder="Choose a username"/>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="regEmail" placeholder="Enter your email"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="regPassword" placeholder="Create a password"/>
    </div>
    <button class="btn-main" onclick="doRegister()">Create Account →</button>
    <div class="msg" id="registerMsg"></div>
  </div>

  <div class="footer-note">Your data is private and secure 🔒</div>
</div>

<script>
  const API = 'http://localhost:8080/api/auth';

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
    document.getElementById(tab + 'Section').classList.add('active');
    document.querySelectorAll('.tab')[tab === 'login' ? 0 : 1].classList.add('active');
    clearMsgs();
  }

  function clearMsgs() {
    ['loginMsg','registerMsg'].forEach(id => {
      const el = document.getElementById(id);
      el.className = 'msg';
      el.textContent = '';
    });
  }

  function showMsg(id, text, type) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = 'msg ' + type;
  }

  async function doLogin() {
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value;
    if (!username || !password) { showMsg('loginMsg','Fill in all fields','error'); return; }

    try {
      const res  = await fetch(`${API}/login`, {
        method: 'POST', credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (!res.ok) { showMsg('loginMsg', data.error, 'error'); return; }

      showMsg('loginMsg', 'Login successful! Redirecting...', 'success');
      setTimeout(() => window.location.href = 'index.html', 800);
    } catch (e) {
      showMsg('loginMsg', 'Server error. Is the app running?', 'error');
    }
  }

  async function doRegister() {
    const username = document.getElementById('regUsername').value.trim();
    const email    = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;

    if (!username || !email || !password) { showMsg('registerMsg','Fill in all fields','error'); return; }
    if (password.length < 6) { showMsg('registerMsg','Password must be at least 6 characters','error'); return; }

    try {
      const res  = await fetch(`${API}/register`, {
        method: 'POST', credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, email, password })
      });
      const data = await res.json();
      if (!res.ok) { showMsg('registerMsg', data.error, 'error'); return; }

      showMsg('registerMsg', 'Account created! Please login now.', 'success');
      setTimeout(() => switchTab('login'), 1500);
    } catch (e) {
      showMsg('registerMsg', 'Server error. Is the app running?', 'error');
    }
  }

  // Allow Enter key to submit
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const loginActive = document.getElementById('loginSection').classList.contains('active');
      if (loginActive) doLogin(); else doRegister();
    }
  });
</script>
</body>
</html>
